<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小汪和周周的双鸣蝉</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f9f3e6 0%, #ffe6d5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 180, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
            padding: 24px 22px 34px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e45c3c, #ff9a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0 0 5px;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #b45a3b;
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-bottom: 2px dotted #ffcdb0;
            display: inline-block;
            padding-bottom: 4px;
        }

        /* 左侧消息盒子图标 */
        .message-icon {
            position: fixed;
            left: 20px;
            bottom: 20px;
            width: 55px;
            height: 55px;
            background: #ff8a5c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 1000;
            font-size: 28px;
        }
        .message-icon:hover {
            transform: scale(1.05);
            background: #ff6b3c;
        }

        /* 留言板侧边栏 */
        .message-board {
            position: fixed;
            left: -320px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: #fff9f5;
            box-shadow: 2px 0 20px rgba(0,0,0,0.1);
            z-index: 1001;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #ffcdb5;
        }
        .message-board.open {
            left: 0;
        }
        .message-header {
            background: #ff8a5c;
            color: white;
            padding: 20px 15px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .message-header .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message-item {
            background: #ffefe4;
            padding: 10px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #6d3b21;
            word-break: break-word;
            border-left: 3px solid #ff8a5c;
        }
        .message-time {
            font-size: 0.65rem;
            color: #b97f5e;
            margin-top: 5px;
            display: block;
        }
        .message-input-area {
            padding: 15px;
            border-top: 1px solid #ffdecb;
            display: flex;
            gap: 8px;
        }
        .message-input-area input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #ffcdb5;
            border-radius: 30px;
            font-size: 0.85rem;
            outline: none;
        }
        .message-input-area input:focus {
            border-color: #ff8a5c;
        }
        .message-input-area button {
            background: #ff8a5c;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .message-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .empty-messages {
            text-align: center;
            color: #c68b6b;
            padding: 30px;
            font-style: italic;
        }

        /* 登录区 */
        .login-overlay {
            background: rgba(0,0,0,0.03);
            border-radius: 48px;
            padding: 20px 18px;
            margin-bottom: 18px;
        }
        .login-title {
            font-weight: 700;
            color: #c25d38;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        .name-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .name-btn {
            background: #fff2ea;
            border: 2px solid #ffcdb5;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #9b4a2a;
            min-width: 130px;
        }
        .name-btn.active {
            background: #ff8a5c;
            border-color: #ff8a5c;
            color: white;
            box-shadow: 0 6px 12px rgba(255, 100, 50, 0.3);
        }
        .name-btn.guest {
            background: #e8d5c5;
            border-color: #d4b89c;
            color: #8b5a3e;
        }
        .name-btn.guest.active {
            background: #b89a7a;
            border-color: #b89a7a;
            color: white;
        }
        .confirm-login {
            margin-top: 20px;
            background: #ff6b3c;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .status-panel {
            background: #fff6ef;
            border-radius: 48px;
            padding: 14px 16px;
            margin: 10px 0 20px;
            box-shadow: inset 0 1px 3px #0001, 0 6px 12px -6px rgba(0,0,0,0.1);
        }
        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffede3;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #ccc;
            transition: all 0.2s;
        }
        .status-dot.online { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .status-dot.offline { background: #e74c3c; }
        
        .peer-status-area {
            background: #ffede3;
            border-radius: 40px;
            padding: 12px 16px;
            margin-top: 8px;
            text-align: center;
        }
        .peer-status-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .peer-dot {
            width: 12px;
            height: 12px;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .peer-dot.online {
            background: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 1.5s infinite;
        }
        .peer-dot.offline { background: #e74c3c; }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .peer-name { color: #c25d38; font-weight: 700; }
        .peer-status-msg { font-size: 0.75rem; color: #b97f5e; margin-top: 5px; }
        
        .info-text {
            background: #ffefe4;
            border-radius: 50px;
            padding: 10px;
            font-size: 0.85rem;
            color: #ad5a38;
            margin-top: 16px;
        }

        .miss-area { margin: 20px 0 18px; }
        .miss-btn {
            background: radial-gradient(circle at 30% 10%, #ff5e3a, #d93c1a);
            border: none;
            width: 170px;
            height: 170px;
            border-radius: 100%;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 20px 30px -8px #ff8c5e, 0 0 0 6px #fff3e8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 0 auto;
        }
        .miss-btn span:first-child { font-size: 3.2rem; }
        .miss-btn span:last-child { font-size: 1.2rem; letter-spacing: 2px; }
        .miss-btn:active { transform: scale(0.94); }
        .miss-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 点赞踩按钮样式 */
        .reaction-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .reaction-btn {
            background: #fff2ea;
            border: 2px solid #ffcdb5;
            padding: 10px 25px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9b4a2a;
        }
        .reaction-btn span:first-child {
            font-size: 1.3rem;
        }
        .reaction-btn span:last-child {
            font-size: 1rem;
            background: #ffede3;
            padding: 2px 8px;
            border-radius: 30px;
            min-width: 35px;
        }
        .reaction-btn:active {
            transform: scale(0.95);
        }
        .reaction-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .like-btn:hover {
            background: #d4f5d4;
            border-color: #2ecc71;
        }
        .dislike-btn:hover {
            background: #ffe0e0;
            border-color: #e74c3c;
        }

        .records-area {
            background: #fff4ed;
            border-radius: 32px;
            padding: 12px 14px;
            margin-top: 18px;
            text-align: left;
            border: 1px solid #ffe0cf;
        }
        .records-title {
            font-weight: 800;
            color: #e05e34;
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #ff8a5c;
            padding-left: 10px;
        }
        .record-list {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        .record-item {
            background: white;
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 28px;
            color: #6d3b21;
            border: 1px solid #ffdecb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .record-time {
            font-family: monospace;
            font-size: 0.7rem;
            background: #fff0e6;
            padding: 2px 8px;
            border-radius: 20px;
            color: #b45a3b;
        }
        .empty-records {
            text-align: center;
            color: #c68b6b;
            padding: 20px;
            font-style: italic;
        }
        footer {
            font-size: 0.7rem;
            color: #c68b6b;
            margin-top: 18px;
        }

        /* 通知队列样式 */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 320px;
        }
        .notification {
            background: #5a3e2e;
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 18px;
            border-radius: 60px;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
            cursor: pointer;
            border-left: 4px solid #ff8a5c;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification-fadeout {
            animation: fadeOut 0.3s ease forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #5a3e2ecc;
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
<canvas id="fireworks-canvas"></canvas>
<div class="notification-container" id="notificationContainer"></div>

<!-- 左侧消息盒子图标 -->
<div class="message-icon" id="messageIcon">
    💬
</div>

<!-- 留言板侧边栏 -->
<div class="message-board" id="messageBoard">
    <div class="message-header">
        📝 访客留言板
        <button class="close-btn" id="closeMessageBoard">×</button>
    </div>
    <div class="message-list" id="messageList">
        <div class="empty-messages">✨ 暂无留言，访客可以留下祝福 ✨</div>
    </div>
    <div class="message-input-area">
        <input type="text" id="messageInput" maxlength="15" placeholder="写点什么吧... (最多15字)">
        <button id="sendMessageBtn">发送</button>
    </div>
</div>

<div class="card" id="app">
    <h1>💕双鸣蝉 💕</h1>
    <div class="sub">爱你的话说过千万遍 句句有回音</div>

    <div class="login-overlay" id="loginPanel">
        <div class="login-title">🌸 hello！是谁来了呀🌸</div>
        <div class="name-buttons">
            <button class="name-btn" data-name="周周">🐣 我是周周</button>
            <button class="name-btn" data-name="小汪">🐶 我是小汪</button>
            <button class="name-btn guest" data-name="访客">👤 谁也不是</button>
        </div>
        <button class="confirm-login" id="confirmLoginBtn">✨ 确认✨</button>
        <div style="font-size:0.7rem; margin-top:12px; color:#b97f5e;">💡 请对号入座哦</div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="status-panel">
            <div class="connection-status">
                <div class="status-badge"><span class="status-dot" id="connDot"></span><span id="connText">连接中...</span></div>
                <div class="status-badge"><span>👤</span><span id="currentUserLabel">未登录</span></div>
            </div>
            <div class="peer-status-area" id="peerStatusArea">
                <div class="peer-status-text">
                    <span class="peer-dot" id="peerDot"></span>
                    <span>💕 <span id="peerNameLabel" class="peer-name">对方</span> <span id="peerStatusText">状态未知</span></span>
                </div>
                <div class="peer-status-msg" id="peerStatusMsg">✨ 连接服务器中...</div>
            </div>
        </div>

        <div class="miss-area">
            <button class="miss-btn" id="missButton">
                <span>💗</span>
                <span>I MISS YOU</span>
            </button>
            
            <!-- 点赞和踩按钮 -->
            <div class="reaction-buttons">
                <button class="reaction-btn like-btn" id="likeBtn">
                    <span>👍</span>
                    <span id="likeCount">0</span>
                </button>
                <button class="reaction-btn dislike-btn" id="dislikeBtn">
                    <span>👎</span>
                    <span id="dislikeCount">0</span>
                </button>
            </div>
            
            <div class="info-text" id="peerHint">💖 点击按钮记录此刻思念！</div>
        </div>

        <div class="records-area">
            <div class="records-title">📜 双鸣蝉说</div>
            <div id="recordList" class="record-list">
                <div class="empty-records">✨ 暂无想念记录，点击按钮留下第一份想念吧 ✨</div>
            </div>
        </div>
        <footer>⚡ 每次点击都会记录。对方在线时会绽放爱心烟花，离线时心意会被保存！</footer>
    </div>
</div>
<div id="toastMsg" class="toast-msg" style="opacity:0;">💬</div>

<script>
    // ========== 爱心烟花特效 ==========
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class HeartParticle {
        constructor(x, y, vx, vy, color) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.color = color;
            this.alpha = 1;
            this.size = 8;
            this.gravity = 0.15;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.alpha -= 0.02;
            this.size *= 0.98;
            return this.alpha > 0;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.fillStyle = this.color;
            ctx.fillText('❤️', this.x, this.y);
            ctx.restore();
        }
    }

    function createFirework(x, y) {
        const colors = ['#ff3366', '#ff6633', '#ff9933', '#ffcc33', '#ff3399', '#ff66cc', '#ff0066'];
        const heartCount = 60;
        for (let i = 0; i < heartCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 3 + Math.random() * 7;
            const vx = Math.cos(angle) * speed * (Math.random() * 1.5);
            const vy = Math.sin(angle) * speed * (Math.random() * 1.5);
            const color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(new HeartParticle(x, y, vx, vy, color));
        }
    }

    function showHeartFirework() {
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        for (let i = 0; i < 3; i++) {
            setTimeout(() => createFirework(x, y), i * 150);
        }
        if (!animationId) {
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles = particles.filter(p => p.update());
                particles.forEach(p => p.draw());
                if (particles.length > 0) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            animate();
        }
    }

    // ========== 小丑特效 ==========
    class ClownParticle {
        constructor(x, y, vx, vy, color) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.color = color;
            this.alpha = 1;
            this.size = 10;
            this.gravity = 0.12;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.alpha -= 0.02;
            this.size *= 0.98;
            return this.alpha > 0;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.fillStyle = this.color;
            ctx.fillText('🤡', this.x, this.y);
            ctx.restore();
        }
    }

    function showClownFirework() {
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        const colors = ['#ffcc00', '#ff9900', '#ff6600', '#ff3300', '#ffff00'];
        const clownCount = 80;
        for (let i = 0; i < clownCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 6;
            const vx = Math.cos(angle) * speed * (Math.random() * 1.5);
            const vy = Math.sin(angle) * speed * (Math.random() * 1.5);
            const color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(new ClownParticle(x, y, vx, vy, color));
        }
        if (!animationId) {
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles = particles.filter(p => p.update());
                particles.forEach(p => p.draw());
                if (particles.length > 0) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            animate();
        }
    }

    // ========== 通知队列系统 ==========
    let notificationQueue = [];
    let isShowingNotification = false;

    function addNotification(message, type = 'info', duration = 3000) {
        notificationQueue.push({ message, type, duration });
        processNotificationQueue();
    }

    function processNotificationQueue() {
        if (isShowingNotification || notificationQueue.length === 0) return;
        
        isShowingNotification = true;
        const { message, type, duration } = notificationQueue.shift();
        
        const container = document.getElementById('notificationContainer');
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.style.borderLeftColor = type === 'miss' ? '#ff6b3c' : '#2ecc71';
        notification.innerHTML = message;
        
        notification.onclick = () => {
            notification.classList.add('notification-fadeout');
            setTimeout(() => {
                notification.remove();
                isShowingNotification = false;
                processNotificationQueue();
            }, 300);
        };
        
        container.appendChild(notification);
        
        setTimeout(() => {
            if (notification.parentElement) {
                notification.classList.add('notification-fadeout');
                setTimeout(() => {
                    notification.remove();
                    isShowingNotification = false;
                    processNotificationQueue();
                }, 300);
            }
        }, duration);
    }

    // ========== 留言板功能 ==========
    let messages = [];
    
    function loadMessages() {
        fetch('/api/messages')
            .then(res => res.json())
            .then(data => {
                messages = data;
                renderMessages();
            })
            .catch(err => console.error('加载留言失败:', err));
    }
    
    function renderMessages() {
        const container = document.getElementById('messageList');
        if (!container) return;
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div class="empty-messages">✨ 暂无留言，访客可以留下祝福 ✨</div>';
            return;
        }
        const sorted = [...messages].sort((a,b) => b.timestamp - a.timestamp);
        container.innerHTML = sorted.map(msg => `
            <div class="message-item">
                ${escapeHtml(msg.content)}
                <span class="message-time">${msg.time}</span>
            </div>
        `).join('');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function sendMessage(content) {
        if (!content || content.trim() === '') {
            addNotification('💬 留言内容不能为空', 'info', 1500);
            return;
        }
        if (content.length > 15) {
            addNotification('💬 留言不能超过15个字', 'info', 1500);
            return;
        }
        if (currentUser !== '访客') {
            addNotification('💬 只有访客身份可以发送留言哦', 'info', 2000);
            return;
        }
        
        fetch('/api/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content.trim() })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                messages = data.messages;
                renderMessages();
                addNotification('📝 留言已发送！', 'info', 1500);
                showClownFirework();
                document.getElementById('messageInput').value = '';
            } else {
                addNotification('❌ 发送失败', 'info', 1500);
            }
        })
        .catch(err => console.error('发送留言失败:', err));
    }

    // ========== 点赞踩功能 ==========
    let likeCount = 0;
    let dislikeCount = 0;
    let lastLikeTime = 0;
    let lastDislikeTime = 0;
    const THROTTLE_INTERVAL = 500; // 1秒最多2次

    function loadReactionCounts() {
        fetch('/api/reactions')
            .then(res => res.json())
            .then(data => {
                likeCount = data.likes || 0;
                dislikeCount = data.dislikes || 0;
                document.getElementById('likeCount').innerText = likeCount;
                document.getElementById('dislikeCount').innerText = dislikeCount;
            })
            .catch(err => console.error('加载反应数据失败:', err));
    }

    function sendLike() {
        const now = Date.now();
        if (now - lastLikeTime < THROTTLE_INTERVAL) {
            addNotification('⚠️ 操作太快啦，请稍后再试', 'info', 1500);
            return;
        }
        lastLikeTime = now;
        
        fetch('/api/like', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    likeCount = data.likes;
                    document.getElementById('likeCount').innerText = likeCount;
                    addNotification(`👍 你点赞了他们！当前共 ${likeCount} 人点赞`, 'miss', 2500);
                }
            })
            .catch(err => console.error('点赞失败:', err));
    }

    function sendDislike() {
        const now = Date.now();
        if (now - lastDislikeTime < THROTTLE_INTERVAL) {
            addNotification('⚠️ 操作太快啦，请稍后再试', 'info', 1500);
            return;
        }
        lastDislikeTime = now;
        
        fetch('/api/dislike', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    dislikeCount = data.dislikes;
                    document.getElementById('dislikeCount').innerText = dislikeCount;
                    addNotification(`👎 你吐槽了他们！当前共 ${dislikeCount} 人吐槽`, 'miss', 2500);
                }
            })
            .catch(err => console.error('吐槽失败:', err));
    }

    // ========== 应用逻辑 ==========
    let currentUser = null;
    let socket = null;
    let isConnected = false;
    let isPartnerOnline = false;
    let isGuest = false;
    const ROOM_ID = "zhouzhou_xiaowang_forever";
    let partnerName = "";

    function showToast(msg, duration = 2000) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    }

    function formatTime() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    }

    function updatePartnerStatusUI() {
        const peerDot = document.getElementById('peerDot');
        const peerStatusText = document.getElementById('peerStatusText');
        const peerStatusMsg = document.getElementById('peerStatusMsg');
        
        if (isGuest) {
            peerDot.className = "peer-dot offline";
            peerStatusText.innerText = "访客模式";
            peerStatusMsg.innerText = `👤 你是访客身份，可以留言、点赞/吐槽，但不能点击miss按钮`;
            return;
        }
        
        if (!partnerName) {
            partnerName = (currentUser === "周周") ? "小汪" : "周周";
            document.getElementById('peerNameLabel').innerText = partnerName;
        }
        
        if (!isConnected) {
            peerDot.className = "peer-dot offline";
            peerStatusText.innerText = "连接异常";
            peerStatusMsg.innerText = "⚠️ 服务器连接失败，请刷新页面";
            return;
        }
        
        if (isPartnerOnline) {
            peerDot.className = "peer-dot online";
            peerStatusText.innerText = "在线 💕";
            peerStatusMsg.innerText = `✨ ${partnerName} 也在线，珍惜当下吧 ✨`;
        } else {
            peerDot.className = "peer-dot offline";
            peerStatusText.innerText = "离线";
            peerStatusMsg.innerText = `⏳ ${partnerName} 暂时不在线，你的心意会被保存，TA上线后就能看到~`;
        }
    }

   function generateMessage(record) {
    const { from, to } = record;
    
    // 访客模式：显示格式为 "周周 正在想 小汪" 或 "小汪 正在想 周周"
    if (isGuest) {
        if (from === "周周" && to === "小汪") {
            return `💕 周周 正在想 小汪`;
        } else if (from === "小汪" && to === "周周") {
            return `💕 小汪 正在想 周周`;
        }
        return `${from} 正在想 ${to}`;
    }
    
    // 正常用户模式（周周或小汪）
    if (currentUser === "周周") {
        if (from === "周周" && to === "小汪") {
            return `💘 你在想小汪，为什么不去找他`;
        } else if (from === "小汪" && to === "周周") {
            return `💞 小汪在想你，快去回应他吧`;
        }
    } else if (currentUser === "小汪") {
        if (from === "小汪" && to === "周周") {
            return `💘 你在想周周，为什么不去找她`;
        } else if (from === "周周" && to === "小汪") {
            return `💞 周周在想你，快去回应她吧`;
        }
    }
    return `${from} → ${to}`;
}

    function renderRecords(records) {
        const container = document.getElementById('recordList');
        if (!container) return;
        if (!records || records.length === 0) {
            container.innerHTML = '<div class="empty-records">📭 你们还没有互相牵挂，快点击按钮留下第一份牵挂～</div>';
            return;
        }
        const sorted = [...records].sort((a,b) => b.timestamp - a.timestamp);
        container.innerHTML = sorted.map(rec => {
            const msg = generateMessage(rec);
            return `<div class="record-item"><span>${msg}</span><span class="record-time">${rec.time}</span></div>`;
        }).join('');
    }

    function loadHistory() {
    // 访客通过 HTTP API 获取记录
    if (isGuest) {
        fetch('/api/records')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    renderRecords(data.records);
                }
            })
            .catch(err => console.error('加载记录失败:', err));
        return;
    }
    if (!socket || !isConnected) return;
    socket.emit('get-records', (response) => {
        if (response && response.success) {
            renderRecords(response.records);
        }
    });
}

    function addRecordToBackend(from, to, time, timestamp, callback) {
        if (!socket || !isConnected || isGuest) {
            showToast("❌ 访客不能发送想念", 1500);
            if (callback) callback(false);
            return;
        }
        socket.emit('new-record', { from, to, time, timestamp }, (response) => {
            if (response && response.success) {
                renderRecords(response.records);
                if (callback) callback(true);
            } else {
                showToast(`❌ 记录失败`, 2000);
                if (callback) callback(false);
            }
        });
    }

    function sendMiss() {
        if (isGuest) {
            showToast("👤 访客身份不能发送想念哦~", 1500);
            return;
        }
        if (!socket || !isConnected) {
            showToast("❌ 网络未连接，请刷新页面重试", 1500);
            return;
        }
        if (!currentUser) {
            showToast("请先登录", 1500);
            return;
        }
        const target = (currentUser === "周周") ? "小汪" : "周周";
        const nowTime = formatTime();
        const timestamp = Date.now();
        
        addRecordToBackend(currentUser, target, nowTime, timestamp, (success) => {
            if (success) {
                socket.emit('miss-notify', { roomId: ROOM_ID, from: currentUser, time: nowTime });
                if (isPartnerOnline) {
                    showToast(`💖 已向${target}传递思念`, 1500);
                } else {
                    showToast(`💖 思念已记录，${target}上线后会收到通知`, 1500);
                }
            }
        });
    }

    function updateConnectionUI() {
        const connDot = document.getElementById('connDot');
        const connText = document.getElementById('connText');
        const missButton = document.getElementById('missButton');
        
        if (isConnected) {
            connDot.className = "status-dot online";
            connText.innerText = "已连接";
            if (missButton && !isGuest) missButton.disabled = false;
            if (missButton && isGuest) missButton.disabled = true;
        } else {
            connDot.className = "status-dot offline";
            connText.innerText = "未连接";
            if (missButton) missButton.disabled = true;
        }
        updatePartnerStatusUI();
    }

    // 留言板UI控制
    function initMessageBoard() {
        const icon = document.getElementById('messageIcon');
        const board = document.getElementById('messageBoard');
        const closeBtn = document.getElementById('closeMessageBoard');
        const sendBtn = document.getElementById('sendMessageBtn');
        const input = document.getElementById('messageInput');
        
        icon.onclick = () => {
            board.classList.add('open');
        };
        closeBtn.onclick = () => {
            board.classList.remove('open');
        };
        sendBtn.onclick = () => {
            sendMessage(input.value);
        };
        input.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage(input.value);
        };
    }

    function setupLogin() {
        let selectedName = null;
        const btns = document.querySelectorAll('.name-btn');
        const confirmBtn = document.getElementById('confirmLoginBtn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedName = btn.getAttribute('data-name');
            });
        });
        confirmBtn.addEventListener('click', () => {
            if (!selectedName) {
                alert("请先选择身份～");
                return;
            }
            currentUser = selectedName;
            isGuest = (currentUser === "访客");
            if (!isGuest) {
                partnerName = (currentUser === "周周") ? "小汪" : "周周";
            }
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('currentUserLabel').innerText = currentUser;
            if (!isGuest) {
                document.getElementById('peerNameLabel').innerText = partnerName;
            } else {
                document.getElementById('peerNameLabel').innerText = "访客";
            }
            initSocketAfterLogin();
        });
    }

    function initSocketAfterLogin() {
        // 加载点赞踩数据（所有用户都需要）
        loadReactionCounts();
        
        // 绑定点赞踩按钮事件
        document.getElementById('likeBtn').onclick = () => sendLike();
        document.getElementById('dislikeBtn').onclick = () => sendDislike();
        
        if (isGuest) {
    isConnected = true;
    updateConnectionUI();
    showToast("👤 访客模式，可以浏览留言板、点赞/吐槽、查看想念记录", 2000);
    loadMessages();
    loadHistory();  // 新增：加载想念记录
    return;
}
        
        const socketUrl = window.location.origin;
        socket = io(socketUrl, {
            transports: ['websocket', 'polling'],
            reconnection: true,
        });
        
        socket.on('connect', () => {
            isConnected = true;
            updateConnectionUI();
            showToast("✅ 连接成功", 1500);
            
            socket.emit('join-room', { roomId: ROOM_ID, identity: currentUser }, (resp) => {
                if (resp && resp.success) {
                    isPartnerOnline = (resp.count === 2);
                    updatePartnerStatusUI();
                    loadHistory();
                    
                    if (resp.count === 2) {
                        addNotification(`🎉 ${partnerName} 在线！可以开始传递思念了`, 'info', 3000);
                    } else {
                        addNotification(`⏳ ${partnerName} 暂时不在线，等待TA上线~`, 'info', 3000);
                    }
                } else {
                    if (resp && resp.message) {
                        addNotification(`❌ ${resp.message}`, 'info', 4000);
                        document.getElementById('missButton').disabled = true;
                    }
                    loadHistory();
                }
            });
        });
        
        socket.on('disconnect', () => {
            isConnected = false;
            isPartnerOnline = false;
            updateConnectionUI();
            addNotification("⚠️ 连接已断开", 'info', 2000);
        });
        
        socket.on('connect_error', () => {
            isConnected = false;
            isPartnerOnline = false;
            updateConnectionUI();
            addNotification("❌ 无法连接服务器，请刷新页面", 'info', 3000);
        });
        
        socket.on('offline-misses', (data) => {
            const { count, misses } = data;
            addNotification(`💌 你不在时间收到了 ${count} 次想念，可惜思念无声`, 'miss', 5000);
            loadHistory();
        });
        
        socket.on('miss-saved-offline', (data) => {
            const { to, count } = data;
            addNotification(`💾 ${to} 不在线，已记录第 ${count} 次思念`, 'info', 1500);
        });
        
        socket.on('room-users', (data) => {
            if (data.roomId === ROOM_ID) {
                const wasOnline = isPartnerOnline;
                isPartnerOnline = (data.count === 2);
                updatePartnerStatusUI();
                
                if (data.count === 2 && !wasOnline) {
                    addNotification(`🎉 ${partnerName} 上线啦！快传递思念吧~`, 'miss', 3000);
                } else if (data.count === 1 && wasOnline) {
                    addNotification(`💔 ${partnerName} 暂时离开了，思念会被保存`, 'info', 3000);
                }
            }
        });
        
        socket.on('someone-missed', (data) => {
            const { from, time } = data || {};
            if (from && from !== currentUser) {
                if ((from === "周周" && currentUser === "小汪") || (from === "小汪" && currentUser === "周周")) {
                    showHeartFirework();
                    addNotification(`💖 ${from} 在 ${time} 想你了！`, 'miss', 4000);
                    loadHistory();
                }
            } else if (!from) {
                showHeartFirework();
                addNotification(`💌 对方想你了一次`, 'miss', 3000);
                loadHistory();
            }
        });
        
        socket.on('records-updated', (data) => {
            if (data && data.records) {
                renderRecords(data.records);
            }
        });
        
        const missBtn = document.getElementById('missButton');
        if (missBtn) missBtn.onclick = () => sendMiss();
        
        loadMessages();
    }
    
    setupLogin();
    initMessageBoard();
</script>
</body>
</html>
