<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>双鸣蝉 | 爱心烟花</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f9f3e6 0%, #ffe6d5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 烟花画布 */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 180, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
            padding: 24px 22px 34px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e45c3c, #ff9a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0 0 5px;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #b45a3b;
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-bottom: 2px dotted #ffcdb0;
            display: inline-block;
            padding-bottom: 4px;
        }

        /* 登录区 */
        .login-overlay {
            background: rgba(0,0,0,0.03);
            border-radius: 48px;
            padding: 20px 18px;
            margin-bottom: 18px;
            transition: all 0.2s;
        }
        .login-title {
            font-weight: 700;
            color: #c25d38;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        .name-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .name-btn {
            background: #fff2ea;
            border: 2px solid #ffcdb5;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #9b4a2a;
            min-width: 130px;
        }
        .name-btn.active {
            background: #ff8a5c;
            border-color: #ff8a5c;
            color: white;
            box-shadow: 0 6px 12px rgba(255, 100, 50, 0.3);
        }
        .name-btn:active {
            transform: scale(0.96);
        }
        .confirm-login {
            margin-top: 20px;
            background: #ff6b3c;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 状态区 - 增强版 */
        .status-panel {
            background: #fff6ef;
            border-radius: 48px;
            padding: 14px 16px;
            margin: 10px 0 20px;
            box-shadow: inset 0 1px 3px #0001, 0 6px 12px -6px rgba(0,0,0,0.1);
        }
        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffede3;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #ccc;
            transition: all 0.2s;
        }
        .status-dot.online { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .status-dot.offline { background: #e74c3c; }
        
        /* 对方在线状态专用区域 */
        .peer-status-area {
            background: #ffede3;
            border-radius: 40px;
            padding: 12px 16px;
            margin-top: 8px;
            text-align: center;
        }
        .peer-status-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .peer-dot {
            width: 12px;
            height: 12px;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .peer-dot.online {
            background: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 1.5s infinite;
        }
        .peer-dot.offline {
            background: #e74c3c;
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.6; transform: scale(0.9); }
        }
        .peer-name {
            color: #c25d38;
            font-weight: 700;
        }
        .peer-status-msg {
            font-size: 0.75rem;
            color: #b97f5e;
            margin-top: 5px;
        }
        
        .info-text {
            background: #ffefe4;
            border-radius: 50px;
            padding: 10px;
            font-size: 0.85rem;
            color: #ad5a38;
            margin-top: 16px;
        }

        /* 想念按钮 */
        .miss-area {
            margin: 20px 0 18px;
        }
        .miss-btn {
            background: radial-gradient(circle at 30% 10%, #ff5e3a, #d93c1a);
            border: none;
            width: 170px;
            height: 170px;
            border-radius: 100%;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 20px 30px -8px #ff8c5e, 0 0 0 6px #fff3e8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 0 auto;
        }
        .miss-btn span:first-child { font-size: 3.2rem; }
        .miss-btn span:last-child { font-size: 1.2rem; letter-spacing: 2px; }
        .miss-btn:active { transform: scale(0.94); }
        .miss-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        /* 记录展示区 */
        .records-area {
            background: #fff4ed;
            border-radius: 32px;
            padding: 12px 14px;
            margin-top: 18px;
            text-align: left;
            border: 1px solid #ffe0cf;
        }
        .records-title {
            font-weight: 800;
            color: #e05e34;
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #ff8a5c;
            padding-left: 10px;
        }
        .record-list {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        .record-item {
            background: white;
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 28px;
            color: #6d3b21;
            border: 1px solid #ffdecb;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .record-time {
            font-family: monospace;
            font-size: 0.7rem;
            background: #fff0e6;
            padding: 2px 8px;
            border-radius: 20px;
            color: #b45a3b;
        }
        .empty-records {
            text-align: center;
            color: #c68b6b;
            padding: 20px;
            font-style: italic;
        }
        .clear-btn {
            background: none;
            border: 1px solid #ffcdb5;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #b45a3b;
            cursor: pointer;
            margin-left: auto;
        }
        footer {
            font-size: 0.7rem;
            color: #c68b6b;
            margin-top: 18px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #5a3e2ecc;
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .offline-badge {
            background: #ff6b3c;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
<canvas id="fireworks-canvas"></canvas>
<div class="card" id="app">
    <h1>💕双鸣蝉 💕</h1>
    <div class="sub">爱你的话说过千万遍 句句有回音</div>

    <!-- 登录区块 -->
    <div class="login-overlay" id="loginPanel">
        <div class="login-title">🌸 hello！是谁来了呀🌸</div>
        <div class="name-buttons">
            <button class="name-btn" data-name="周周">🐣 我是周周</button>
            <button class="name-btn" data-name="小汪">🐶 我是小汪</button>
        </div>
        <button class="confirm-login" id="confirmLoginBtn">✨ 确认✨</button>
        <div style="font-size:0.7rem; margin-top:12px; color:#b97f5e;">💡 选择身份，查看ta是否在线</div>
    </div>

    <!-- 主内容区 -->
    <div id="mainContent" style="display: none;">
        <!-- 状态栏 -->
        <div class="status-panel">
            <div class="connection-status">
                <div class="status-badge"><span class="status-dot" id="connDot"></span><span id="connText">连接中...</span></div>
                <div class="status-badge"><span>👤</span><span id="currentUserLabel">未登录</span></div>
            </div>
            
            <!-- 对方在线状态显示区域 -->
            <div class="peer-status-area" id="peerStatusArea">
                <div class="peer-status-text">
                    <span class="peer-dot" id="peerDot"></span>
                    <span>💕 <span id="peerNameLabel" class="peer-name">对方</span> <span id="peerStatusText">状态未知</span></span>
                </div>
                <div class="peer-status-msg" id="peerStatusMsg">✨ 连接服务器中...</div>
            </div>
        </div>

        <!-- 想念按钮 -->
        <div class="miss-area">
            <button class="miss-btn" id="missButton">
                <span>💗</span>
                <span>I MISS YOU</span>
            </button>
            <div class="info-text" id="peerHint">💖 点击按钮记录此刻思念！</div>
        </div>

        <!-- 记录展示区 -->
        <div class="records-area">
            <div class="records-title">
                📜 双鸣蝉说
            </div>
            <div id="recordList" class="record-list">
                <div class="empty-records">✨ 暂无想念记录，点击按钮留下第一份想念吧 ✨</div>
            </div>
        </div>
        <footer>⚡ 每次点击都会记录。对方在线时会绽放爱心烟花，离线时心意会被保存！</footer>
    </div>
</div>
<div id="toastMsg" class="toast-msg" style="opacity:0;">💬</div>

<script>
    // ========== 爱心烟花特效 ==========
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class HeartParticle {
        constructor(x, y, vx, vy, color) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.color = color;
            this.alpha = 1;
            this.size = 8;
            this.gravity = 0.15;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.alpha -= 0.02;
            this.size *= 0.98;
            return this.alpha > 0;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.fillStyle = this.color;
            ctx.fillText('❤️', this.x, this.y);
            ctx.restore();
        }
    }

    function createFirework(x, y) {
        const colors = ['#ff3366', '#ff6633', '#ff9933', '#ffcc33', '#ff3399', '#ff66cc', '#ff0066'];
        const heartCount = 60;
        for (let i = 0; i < heartCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 3 + Math.random() * 7;
            const vx = Math.cos(angle) * speed * (Math.random() * 1.5);
            const vy = Math.sin(angle) * speed * (Math.random() * 1.5);
            const color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(new HeartParticle(x, y, vx, vy, color));
        }
    }

    function showHeartFirework() {
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        // 连续三次烟花
        for (let i = 0; i < 3; i++) {
            setTimeout(() => createFirework(x, y), i * 150);
        }
        if (!animationId) {
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles = particles.filter(p => p.update());
                particles.forEach(p => p.draw());
                if (particles.length > 0) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            animate();
        }
    }

    // ========== 应用逻辑 ==========
    let currentUser = null;
    let socket = null;
    let isConnected = false;
    let isPartnerOnline = false;
    const ROOM_ID = "zhouzhou_xiaowang_forever";
    let partnerName = "";

    function showToast(msg, duration = 2000) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    }

    function formatTime() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    }

    function updatePartnerStatusUI() {
        const peerDot = document.getElementById('peerDot');
        const peerStatusText = document.getElementById('peerStatusText');
        const peerStatusMsg = document.getElementById('peerStatusMsg');
        
        if (!partnerName) {
            partnerName = (currentUser === "周周") ? "小汪" : "周周";
            document.getElementById('peerNameLabel').innerText = partnerName;
        }
        
        if (!isConnected) {
            peerDot.className = "peer-dot offline";
            peerStatusText.innerText = "连接异常";
            peerStatusMsg.innerText = "⚠️ 服务器连接失败，请刷新页面";
            return;
        }
        
        if (isPartnerOnline) {
            peerDot.className = "peer-dot online";
            peerStatusText.innerText = "在线 💕";
            peerStatusMsg.innerText = `✨ ${partnerName} 也在线，珍惜当下吧 ✨`;
        } else {
            peerDot.className = "peer-dot offline";
            peerStatusText.innerText = "离线";
            peerStatusMsg.innerText = `⏳ ${partnerName} 暂时不在线，你的心意会被保存，TA上线后就能看到~`;
        }
    }

    function generateMessage(record) {
        const { from, to, time } = record;
        if (currentUser === "周周") {
            if (from === "周周" && to === "小汪") {
                return `💘 你在想小汪，为什么不直接找他`;
            } else if (from === "小汪" && to === "周周") {
                return `💞 小汪在想你，快去回应他`;
            }
        } else if (currentUser === "小汪") {
            if (from === "小汪" && to === "周周") {
                return `💘 你在想周周，为什么不直接找她`;
            } else if (from === "周周" && to === "小汪") {
                return `💞 周周在想你，快去回应她`;
            }
        }
        return `${from} → ${to} at ${time}`;
    }

    function renderRecords(records) {
        const container = document.getElementById('recordList');
        if (!container) return;
        if (!records || records.length === 0) {
            container.innerHTML = '<div class="empty-records">📭 你们还没有互相牵挂，快点击按钮留下第一份牵挂～</div>';
            return;
        }
        const sorted = [...records].sort((a,b) => b.timestamp - a.timestamp);
        container.innerHTML = sorted.map(rec => {
            const msg = generateMessage(rec);
            return `<div class="record-item"><span>${msg}</span><span class="record-time">${rec.time}</span></div>`;
        }).join('');
    }

    function loadHistory() {
        if (!socket || !isConnected) return;
        socket.emit('get-records', (response) => {
            if (response && response.success) {
                const records = response.records || [];
                window.recordsData = records;
                renderRecords(records);
            }
        });
    }

    function addRecordToBackend(from, to, time, timestamp, callback) {
        if (!socket || !isConnected) {
            showToast("❌ 未连接服务器，无法记录", 1500);
            if (callback) callback(false);
            return;
        }
        socket.emit('new-record', { from, to, time, timestamp }, (response) => {
            if (response && response.success) {
                window.recordsData = response.records;
                renderRecords(window.recordsData);
                showToast(`📝 已记录：${from} 想念 ${to}`, 1500);
                if (callback) callback(true);
            } else {
                showToast(`❌ 记录失败`, 2000);
                if (callback) callback(false);
            }
        });
    }

    function sendMiss() {
        if (!socket || !isConnected) {
            showToast("❌ 网络未连接，请刷新页面重试", 1500);
            return;
        }
        if (!currentUser) {
            showToast("请先登录", 1500);
            return;
        }
        const target = (currentUser === "周周") ? "小汪" : "周周";
        const nowTime = formatTime();
        const timestamp = Date.now();
        
        addRecordToBackend(currentUser, target, nowTime, timestamp, (success) => {
            if (success) {
                socket.emit('miss-notify', { roomId: ROOM_ID, from: currentUser, time: nowTime });
                if (isPartnerOnline) {
                    showToast(`💖 已向${target}传递思念，TA会收到爱心烟花`, 1500);
                } else {
                    showToast(`💖 思念已记录，${target}上线后会收到通知`, 1500);
                }
            }
        });
    }

    function updateConnectionUI() {
        const connDot = document.getElementById('connDot');
        const connText = document.getElementById('connText');
        const missButton = document.getElementById('missButton');
        
        if (isConnected) {
            connDot.className = "status-dot online";
            connText.innerText = "已连接";
            if (missButton) missButton.disabled = false;
        } else {
            connDot.className = "status-dot offline";
            connText.innerText = "未连接";
            if (missButton) missButton.disabled = true;
        }
        updatePartnerStatusUI();
    }

    function setupLogin() {
        let selectedName = null;
        const btns = document.querySelectorAll('.name-btn');
        const confirmBtn = document.getElementById('confirmLoginBtn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedName = btn.getAttribute('data-name');
            });
        });
        confirmBtn.addEventListener('click', () => {
            if (!selectedName) {
                alert("请先选择你是周周还是小汪～");
                return;
            }
            currentUser = selectedName;
            partnerName = (currentUser === "周周") ? "小汪" : "周周";
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('currentUserLabel').innerText = currentUser;
            document.getElementById('peerNameLabel').innerText = partnerName;
            initSocketAfterLogin();
        });
    }

    function initSocketAfterLogin() {
        const socketUrl = window.location.origin;
        socket = io(socketUrl, {
            transports: ['websocket', 'polling'],
            reconnection: true,
        });
        
        socket.on('connect', () => {
            isConnected = true;
            updateConnectionUI();
            showToast("✅ 连接成功", 1500);
            
            socket.emit('join-room', { roomId: ROOM_ID, identity: currentUser }, (resp) => {
                if (resp && resp.success) {
                    isPartnerOnline = (resp.count === 2);
                    updatePartnerStatusUI();
                    loadHistory();
                    
                    if (resp.count === 2) {
                        showToast(`🎉 ${partnerName} 在线！发送想念会有爱心烟花~`, 2000);
                    } else {
                        showToast(`⏳ ${partnerName} 暂时不在线，等待TA上线~`, 2000);
                    }
                } else {
                    // 身份冲突或房间满
                    if (resp && resp.message) {
                        alert(resp.message);
                        showToast(`❌ ${resp.message}`, 3000);
                        document.getElementById('missButton').disabled = true;
                    }
                    loadHistory();
                }
            });
        });
        
        socket.on('disconnect', () => {
            isConnected = false;
            isPartnerOnline = false;
            updateConnectionUI();
            showToast("⚠️ 连接断开", 2000);
        });
        
        socket.on('connect_error', () => {
            isConnected = false;
            isPartnerOnline = false;
            updateConnectionUI();
            showToast("❌ 无法连接服务器", 3000);
        });
        
        // 收到离线期间的想念通知
        socket.on('offline-misses', (data) => {
            const { count, misses } = data;
            showToast(`💌 你离线期间收到了 ${count} 次想念！`, 4000);
            alert(`💌 你不在的时候，${partnerName} 想你了 ${count} 次！快去陪陪TA吧`);
            loadHistory();
        });
        
        // 对方离线时发送想念的反馈
        socket.on('miss-saved-offline', (data) => {
            const { to, count } = data;
            showToast(`💾 ${to} 不在线，想念已记录 (想了${count}次)`, 2000);
        });
        
        socket.on('room-users', (data) => {
            if (data.roomId === ROOM_ID) {
                const wasOnline = isPartnerOnline;
                isPartnerOnline = (data.count === 2);
                updatePartnerStatusUI();
                
                if (data.count === 2 && !wasOnline) {
                    showToast(`🎉 ${partnerName} 上线啦！快点击按钮传递思念吧~`, 3000);
                } else if (data.count === 1 && wasOnline) {
                    showToast(`💔 ${partnerName} 暂时离开了，你的心意会被保存`, 3000);
                }
            }
        });
        
        // 收到想念通知（对方在线时，带烟花特效！）
        socket.on('someone-missed', (data) => {
            const { from, time } = data || {};
            if (from && from !== currentUser) {
                if ((from === "周周" && currentUser === "小汪") || (from === "小汪" && currentUser === "周周")) {
                    // 🎆 绽放爱心烟花！
                    showHeartFirework();
                    alert(`💌 ${from} 在 ${time} 想你了，快去回应吧 💌`);
                    showToast(`💖 ${from} 想你了！爱心烟花为你绽放~`, 2000);
                    loadHistory();
                }
            } else if (!from) {
                showHeartFirework();
                alert("💌 对方想你了一次 💌");
                loadHistory();
            }
        });
        
        socket.on('records-updated', (data) => {
            if (data && data.records) {
                window.recordsData = data.records;
                renderRecords(window.recordsData);
            }
        });
        
        const missBtn = document.getElementById('missButton');
        if (missBtn) missBtn.onclick = () => sendMiss();
    }
    
    setupLogin();
</script>
</body>
</html>
